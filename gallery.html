<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Your Gallery</title>

    <style>
        body {
            overflow: auto;
        }
    </style>
</head>

<body>
    <main class="gallery">
        <h1 class="title">Your Gallery</h1>
        <div class="photo-grid">
            <div id="boxA" class="photo-card">
                <img src="assets\photos\IMG_1749.jpg" alt="">
                <p class="caption">Some caption goes here</p>
            </div>
            <div id="boxB" class="photo-card">
                <img src="assets\photos\img0.jpg" alt="">
                <p class="caption">Some caption goes here</p>
            </div>
            <div class="myBox" id="boxS1">
                <p class="date">"05.06.25"</p>
            </div>
            <div id="boxC" class="photo-card">
                <img src="assets\photos\IMG_1749.jpg" alt="">
                <p class="caption">You already know this one. this is a classic</p>
            </div>
            <div id="boxD" class="photo-card">
                <img src="assets\photos\IMG_1749.jpg" alt="">
                <p class="caption">Some caption goes here</p>
            </div>
            <div class="myBox" id="boxS2">
                <p class="quote">"some other quote here too"</p>
            </div>
            <div id="boxE" class="photo-card">
                <img src="assets\photos\img0.jpg" alt="">
                <p class="caption">Some caption goes here</p>
            </div>
            <div class="myBox" id="boxS3">
                <h3 class="lavinia">Lavinia</h3>
            </div>
            <div id="boxF" class="photo-card">
                <img src="assets\photos\img0.jpg" alt="">
                <p class="caption">Some caption goes here</p>
            </div>
            <div id="boxG" class="photo-card">
                <img src="assets\photos\img0.jpg" alt="">
                <p class="caption">Some caption goes here</p>
            </div>
            <div id="boxH" class="photo-card">
                <img src="assets\photos\IMG_1749.jpg" alt="">
                <p class="caption">Some caption goes here</p>
            </div>
        </div>
        <a class="link-btn" href="index.html">Next</a>
    </main>

    <!-- Lightbox overlay -->
    <div class="lightbox">
        <img src="" alt="" class="lightbox-img">
        <p class="lightbox-caption"></p>
    </div>

    <script>
        const lightbox = document.querySelector(".lightbox");
        const lightboxImg = document.querySelector(".lightbox-img");
        const lightboxCaption = document.querySelector(".lightbox-caption");
        const lightboxText = document.querySelector(".lightbox-text");
        const photocards = document.querySelectorAll(".photo-card");
        const myBox = document.querySelectorAll(".myBox")

        photocards.forEach(card => {
            card.addEventListener("click", function () {
                const clickedImage = card.querySelector("img");
                const clickedCaption = card.querySelector("p");
                lightboxImg.src = clickedImage.src
                lightboxCaption.innerHTML = clickedCaption.innerHTML
                lightbox.classList.add("active")
            })
        })

        lightbox.addEventListener("click", function () {
            lightbox.classList.remove("active")
        })

        myBox.forEach(box => {
            box.addEventListener("click", function(){
                const clickedText = box.querySelector("p")
                if (clickedText.classList.contains("date")){
                    lightboxText.innerHTML = "This is the date or somehting"
                }
            })
        })
    </script>

</body>

</html>
